<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Spelling &amp; Quality Audit — Company 48</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e0e0e0; padding: 24px; line-height: 1.5; }
  h1 { font-size: 1.6rem; margin-bottom: 8px; color: #fff; }
  h2 { font-size: 1.2rem; margin: 24px 0 12px; color: #a0c4ff; border-bottom: 1px solid #2a2d35; padding-bottom: 6px; }
  h3 { font-size: 1rem; margin: 16px 0 8px; color: #c0c0c0; }

  .controls { display: flex; gap: 12px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
  .controls label { font-size: 0.85rem; color: #aaa; }
  .controls input { background: #1a1d27; border: 1px solid #3a3d47; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 0.9rem; }
  .controls input[type="number"] { width: 80px; }
  .controls .ai-toggle { display: flex; align-items: center; gap: 6px; }
  .controls .ai-toggle input[type="checkbox"] { width: auto; }
  .ai-note { font-size: 0.75rem; color: #666; margin-left: 4px; }
  .tag-ai { background: #10b98122; color: #34d399; }
  button { background: #2563eb; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; font-size: 0.95rem; cursor: pointer; font-weight: 600; }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #444; cursor: not-allowed; }

  .progress-area { margin: 16px 0; }
  .progress-bar { width: 100%; height: 8px; background: #1a1d27; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: #2563eb; width: 0%; transition: width 0.3s; }
  .progress-text { font-size: 0.8rem; color: #888; margin-top: 4px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin: 16px 0; }
  .card { background: #1a1d27; border-radius: 10px; padding: 16px; text-align: center; border: 1px solid #2a2d35; }
  .card .value { font-size: 2rem; font-weight: 700; }
  .card .label { font-size: 0.78rem; color: #888; margin-top: 4px; }
  .card.red .value { color: #ef4444; }
  .card.orange .value { color: #f59e0b; }
  .card.green .value { color: #22c55e; }
  .card.blue .value { color: #3b82f6; }

  table { width: 100%; border-collapse: collapse; margin: 8px 0 20px; font-size: 0.85rem; }
  th { text-align: left; padding: 8px 10px; background: #1a1d27; color: #a0c4ff; border-bottom: 2px solid #2a2d35; white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid #1e2028; }
  tr:hover td { background: #1a1d27; }
  a { color: #60a5fa; text-decoration: none; }
  a:hover { text-decoration: underline; }

  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .tag-spelling { background: #7c3aed22; color: #a78bfa; }
  .tag-structural { background: #f59e0b22; color: #fbbf24; }
  .tag-forbidden { background: #ef444422; color: #f87171; }
  .tag-brand { background: #06b6d422; color: #22d3ee; }

  .error-details { display: none; }
  .error-details.open { display: table-row; }
  .error-details td { padding: 8px 10px 12px 40px; background: #12141b; border-bottom: 2px solid #2a2d35; }
  .error-list { list-style: none; padding: 0; margin: 0; }
  .error-list li { padding: 3px 0; font-size: 0.82rem; display: flex; align-items: baseline; gap: 8px; }
  .error-list li::before { content: ''; display: inline-block; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
  .error-list li.cat-spelling::before { background: #a78bfa; }
  .error-list li.cat-brand::before { background: #22d3ee; }
  .error-list li.cat-forbidden::before { background: #f87171; }
  .error-list li.cat-structural::before { background: #fbbf24; }
  .toggle-row { cursor: pointer; }
  .toggle-row:hover td { background: #1e2030; }
  .toggle-arrow { display: inline-block; transition: transform 0.2s; font-size: 0.75rem; color: #666; margin-right: 4px; }
  .toggle-arrow.open { transform: rotate(90deg); }

  .histogram { display: flex; align-items: flex-end; gap: 4px; height: 100px; margin: 12px 0; }
  .hist-bar { flex: 1; background: #2563eb; border-radius: 3px 3px 0 0; min-width: 40px; position: relative; }
  .hist-bar .hist-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #888; white-space: nowrap; }
  .hist-bar .hist-count { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; color: #ccc; }

  .filter-btn { background: #1a1d27; color: #888; border: 1px solid #2a2d35; padding: 5px 14px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-weight: 600; }
  .filter-btn:hover { border-color: #3a3d47; color: #ccc; }
  .filter-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }

  #results { display: none; }
  .muted { color: #666; font-size: 0.85rem; }
</style>
</head>
<body>

<h1>Spelling &amp; Quality Audit</h1>
<p class="muted">Fetches live items from Auctionet public API and runs offline spelling, brand, and structural checks.</p>

<div class="controls">
  <label>Company ID: <input type="number" id="companyId" value="48"></label>
  <div class="ai-toggle">
    <label><input type="checkbox" id="aiEnabled"> AI Spellcheck (Haiku)</label>
    <span class="ai-note">~$0.50 for 900 items</span>
  </div>
  <span id="apiStatus" class="muted"></span>
  <button id="runBtn">Run Audit</button>
</div>

<div class="progress-area">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-text" id="progressText"></div>
</div>

<div id="results"></div>

<script type="module" src="spelling-audit.js"></script>
</body>
</html>
